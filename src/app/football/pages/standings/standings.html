<div class="standings-container">
  <h2>🏆 ตารางคะแนน</h2>

  <app-league-selector 
    [selectedLeagueId]="espnService.selectedLeague()" 
    (leagueChange)="changeLeague($event)">
  </app-league-selector>

  <div class="table-wrapper">
    @if (isLoading()) {
      <div class="status-message">⏳ กำลังโหลดตารางคะแนน...</div>
    } @else if (standings().length > 0) {
      
      <app-standings-table [standings]="standings()"></app-standings-table>
      
    } @else {
      <div class="status-message empty">❌ ไม่พบข้อมูลตารางคะแนนสำหรับลีกนี้</div>
    }
  </div>

  <div class="legend-container">
    <div class="legend-item">
      <div class="color-box ucl"></div>
      <span>ยูฟ่า แชมเปียนส์ลีก</span>
    </div>
    <div class="legend-item">
      <div class="color-box uel"></div>
      <span>ยูโรปาลีก</span>
    </div>
    <div class="legend-item">
      <div class="color-box relegation"></div>
      <span>ตกชั้น</span>
    </div>
  </div>

</div>
